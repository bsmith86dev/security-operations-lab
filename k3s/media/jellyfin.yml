---
# k3s/media/jellyfin.yml
# Jellyfin — GPU-accelerated media server
# Hardware transcoding via AMD RX 5700 XT (VAAPI) on k3s-worker-amd
# External: https://jellyfin.blerdmh.com
#
# Prerequisites:
#   - docs/03-GPU-PASSTHROUGH.md completed
#   - AMD GPU device plugin installed in kube-system
#   - k3s-worker-amd node labeled: amd.com/gpu=present
#   - /dev/dri/renderD128 visible inside the VM

# ─── Shared NFS volume from ZimaBoard TrueNAS ─────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs
spec:
  capacity:
    storage: 8Ti
  accessModes:
    - ReadWriteMany
  nfs:
    path: /mnt/tank/media
    server: 10.0.20.20
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-media
  resources:
    requests:
      storage: 8Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

# ─── Jellyfin with GPU ────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  annotations:
    lab.blerdmh.com/gpu: "amd-rx5700xt-vaapi"
    lab.blerdmh.com/node: "k3s-worker-amd"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Must run on k3s-worker-amd — that's where the GPU lives
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-amd

      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: https://jellyfin.blerdmh.com
            - name: JELLYFIN_FFMPEG_VAAPI_DEVICE
              value: /dev/dri/renderD128
          ports:
            - containerPort: 8096
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              amd.com/gpu: 1
            limits:
              cpu: 4000m
              memory: 6Gi
              amd.com/gpu: 1
          securityContext:
            privileged: false
            supplementalGroups:
              - 44    # video group
              - 105   # render group (verify with: getent group render inside the VM)
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 15
            periodSeconds: 10

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          persistentVolumeClaim:
            claimName: media-library
        # Expose DRI render device from VM host into the pod
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  selector:
    app: jellyfin
  ports:
    - port: 8096
      targetPort: 8096
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
spec:
  rules:
    - host: jellyfin.blerdmh.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
  tls:
    - hosts:
        - jellyfin.blerdmh.com
      secretName: jellyfin-tls

# ─── Radarr ───────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      # *arr apps don't need GPU — run on N1 worker to free AMDPVE for security work
      nodeSelector:
        workload: media
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Chicago
          ports:
            - containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media-library
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
spec:
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878

