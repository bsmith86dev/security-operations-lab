---
# ansible/roles/common/tasks/wazuh_agent.yml
# Installs and enrolls the Wazuh agent on any non-manager host

- name: Add Wazuh GPG key
  apt_key:
    url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Add Wazuh apt repository
  apt_repository:
    repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
    state: present
    filename: wazuh

- name: Install Wazuh agent
  apt:
    name: wazuh-agent
    state: present
    update_cache: true

- name: Configure Wazuh agent
  template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: wazuh
    mode: '0640'
  notify: Restart Wazuh agent

- name: Enable and start Wazuh agent
  service:
    name: wazuh-agent
    enabled: true
    state: started
