---
# k3s/personal/home-assistant.yml
# Home Assistant — runs in homeauto namespace
# External: https://ha.blerdmh.com
# Note: HA needs access to VLAN 50 (IoT) for device discovery
# The k3s node hosting HA should have a NIC on VLAN 50, or use
# a host-network pod on a node physically on that VLAN.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeassistant-config
  namespace: homeauto
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeauto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      # Run on Pi 5 — it's on VLAN 60 and can reach VLAN 50 via OPNsense rules
      nodeSelector:
        node-type: arm
      # hostNetwork gives HA access to mDNS/discovery on the node's VLAN
      hostNetwork: false
      containers:
        - name: homeassistant
          image: ghcr.io/home-assistant/home-assistant:stable
          env:
            - name: TZ
              value: America/Chicago
          ports:
            - containerPort: 8123
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            privileged: false
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: homeauto
spec:
  selector:
    app: homeassistant
  ports:
    - port: 8123
      targetPort: 8123
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant
  namespace: homeauto
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: homeauto-ha-headers@kubernetescrd
spec:
  rules:
    - host: ha.blerdmh.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123
  tls:
    - hosts:
        - ha.blerdmh.com
      secretName: ha-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ha-headers
  namespace: homeauto
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    customResponseHeaders:
      Strict-Transport-Security: "max-age=31536000"
