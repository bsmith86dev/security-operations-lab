# k3s/ingress/traefik-values.yml
# Helm values for Traefik v3

deployment:
  replicas: 2

service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/address-pool: lab-pool

ports:
  web:
    port: 80
    redirectTo:
      port: websecure
  websecure:
    port: 443
    tls:
      enabled: true

ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - websecure

additionalArguments:
  - "--providers.kubernetescrd=true"
  - "--providers.kubernetesingress=true"
  - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
  - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
  - "--certificatesresolvers.cloudflare.acme.email=your@email.com"
  - "--certificatesresolvers.cloudflare.acme.storage=/data/acme.json"
  - "--log.level=INFO"
  - "--accesslog=true"
  - "--metrics.prometheus=true"

env:
  - name: CF_API_EMAIL
    valueFrom:
      secretKeyRef:
        name: cloudflare-credentials
        key: email
  - name: CF_API_KEY
    valueFrom:
      secretKeyRef:
        name: cloudflare-credentials
        key: api-key

persistence:
  enabled: true
  storageClass: longhorn
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
