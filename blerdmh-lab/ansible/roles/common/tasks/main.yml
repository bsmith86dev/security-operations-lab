---
# ansible/roles/common/tasks/main.yml
# Applied to ALL Linux hosts in the lab

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update apt cache and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install baseline packages
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - nmap
      - tcpdump
      - net-tools
      - unzip
      - jq
      - fail2ban
      - ufw
      - chrony
      - auditd
      - rsyslog
      - python3-pip
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Create lab admin user
  user:
    name: labadmin
    groups: sudo
    shell: /bin/bash
    create_home: yes
    state: present

- name: Add SSH public key for labadmin
  authorized_key:
    user: labadmin
    key: "{{ lookup('file', '~/.ssh/lab_ed25519.pub') }}"
    state: present

- name: Harden SSH configuration
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
  notify: Restart SSH

- name: Set timezone to America/Chicago
  timezone:
    name: America/Chicago

- name: Configure chrony NTP
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
  notify: Restart chrony

- name: Enable and start fail2ban
  service:
    name: fail2ban
    enabled: yes
    state: started

- name: Configure fail2ban SSH jail
  copy:
    dest: /etc/fail2ban/jail.d/sshd.conf
    content: |
      [sshd]
      enabled = true
      port = 22
      maxretry = 5
      bantime = 3600
      findtime = 600
  notify: Restart fail2ban

- name: Install Wazuh agent
  include_tasks: wazuh_agent.yml
  when: inventory_hostname not in groups['security_vms'] or
        (inventory_hostname in groups['security_vms'] and vm_role != 'siem')

- name: Configure auditd rules
  copy:
    src: audit.rules
    dest: /etc/audit/rules.d/lab.rules
    owner: root
    group: root
    mode: '0640'
  notify: Restart auditd

- name: Enable auditd
  service:
    name: auditd
    enabled: yes
    state: started

- name: Set kernel hardening parameters (sysctl)
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: 'net.ipv4.ip_forward', value: '0' }  # Overridden on k3s nodes
    - { key: 'net.ipv4.conf.all.rp_filter', value: '1' }
    - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
    - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { key: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
    - { key: 'kernel.dmesg_restrict', value: '1' }
    - { key: 'kernel.kptr_restrict', value: '2' }
    - { key: 'fs.suid_dumpable', value: '0' }

- name: Configure rsyslog to forward to Wazuh
  copy:
    dest: /etc/rsyslog.d/99-wazuh.conf
    content: |
      *.* @10.0.40.10:514
  notify: Restart rsyslog

handlers:
  - name: Restart SSH
    service:
      name: ssh
      state: restarted

  - name: Restart chrony
    service:
      name: chrony
      state: restarted

  - name: Restart fail2ban
    service:
      name: fail2ban
      state: restarted

  - name: Restart auditd
    service:
      name: auditd
      state: restarted

  - name: Restart rsyslog
    service:
      name: rsyslog
      state: restarted
