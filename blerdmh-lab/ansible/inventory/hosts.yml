# Ansible Inventory — blerdmh Lab
# File: ansible/inventory/hosts.yml

all:
  vars:
    ansible_user: labadmin
    ansible_ssh_private_key_file: ~/.ssh/lab_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:

    # ─── Proxmox Hypervisors ───────────────────────────────────────────
    proxmox_nodes:
      hosts:
        amdpve:
          ansible_host: 10.0.10.10
          pve_node_name: amdpve
          pve_role: primary
          pve_ram_gb: 128
          pve_cores: 24  # 7900X 12C/24T
        n1pve:
          ansible_host: 10.0.10.11
          pve_node_name: n1pve
          pve_role: secondary
          pve_ram_gb: 16
          pve_cores: 16  # 5825U 8C/16T

    # ─── k3s Cluster ──────────────────────────────────────────────────
    k3s_cluster:
      children:
        k3s_control_plane:
          hosts:
            k3s-cp:
              ansible_host: 10.0.10.30
              node_role: control-plane
              k3s_server_ip: 10.0.20.10
        k3s_workers:
          hosts:
            k3s-worker-pi5:
              ansible_host: 10.0.10.31
              node_role: worker
              node_labels: "node-type=arm,workload=personal"
              node_taints: ""
            k3s-worker-amd:
              ansible_host: 10.0.20.12
              node_role: worker
              node_labels: "node-type=x86,workload=heavy,vlan=security"
              node_taints: "workload=heavy:NoSchedule"
            k3s-worker-n1:
              ansible_host: 10.0.20.13
              node_role: worker
              node_labels: "node-type=x86,workload=media"
              node_taints: ""

    # ─── NAS ──────────────────────────────────────────────────────────
    nas:
      hosts:
        zimaboard:
          ansible_host: 10.0.10.40
          nas_role: primary
          nas_os: truenas-scale

    # ─── Security Stack (bare-metal VMs, not k3s) ─────────────────────
    security_vms:
      hosts:
        wazuh-vm:
          ansible_host: 10.0.40.10
          vm_role: siem
          vm_ram_gb: 16
          vm_cores: 8
        ids-vm:
          ansible_host: 10.0.40.11
          vm_role: ids
          vm_ram_gb: 8
          vm_cores: 4
        openvas-vm:
          ansible_host: 10.0.40.12
          vm_role: scanner
          vm_ram_gb: 8
          vm_cores: 4
        grafana-vm:
          ansible_host: 10.0.40.13
          vm_role: monitoring
          vm_ram_gb: 8
          vm_cores: 4

    # ─── Raspberry Pis ────────────────────────────────────────────────
    pi_devices:
      hosts:
        k3s-cp:  # already in k3s_control_plane
        k3s-worker-pi5:  # already in k3s_workers

    # ─── All Linux hosts (for common role) ────────────────────────────
    linux_hosts:
      children:
        k3s_cluster:
        security_vms:
        nas:
